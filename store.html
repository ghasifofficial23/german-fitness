<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store | German Fitness & Sports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="cart.js"></script>
    <style>
        .store-header {
            padding: 10rem 0 5rem;
            text-align: center;
            background: linear-gradient(to bottom, #000, #0a0a0a);
        }
        .store-filters {
            margin-bottom: 3rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        .filter-btn {
            padding: 0.6rem 1.8rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-body);
            font-weight: 500;
        }
        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
        }
        .filter-btn.active {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.3);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
            <div class="logo-icon">✕</div>
            GERMAN <span>FITNESS</span>
        </div>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#services">Services</a></li>
            <li><a href="store.html" class="text-accent">Store</a></li>
            <li><a href="index.html#blogs">Blogs</a></li>
            <li><a href="index.html#reviews">Reviews</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li><a href="admin.html" class="nav-admin">Admin</a></li>
        </ul>
        <a href="index.html#join" class="btn btn-primary nav-join">Join Now</a>
    </nav>

    <header class="store-header">
        <div class="container">
            <h1 class="text-accent">STORE</h1>
            <p>Premium quality supplements and top-tier gym equipment.</p>
        </div>
    </header>

    <section class="store-content">
        <div class="container">
            <div class="store-filters" style="display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 3rem;">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="protein">Protein</button>
                <button class="filter-btn" data-filter="preworkout">Pre-Workout</button>
                <button class="filter-btn" data-filter="equipment">Equipment</button>
            </div>
            <div class="products-grid" id="all-products">
                <!-- Products will be loaded via JS -->
            </div>
        </div>
    </section>

    <!-- Cart UI -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Your Shopping Cart</h3>
            <button class="btn btn-outline" id="close-cart" style="padding: 0.5rem;">✕</button>
        </div>
        <div class="cart-items" id="cart-items-container">
            <!-- Items injected by JS -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total Bill:</span>
                <span id="cart-total-amount">0 PKR</span>
            </div>
            <button id="checkout-btn" class="btn btn-primary btn-block">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Floating Cart Button -->
    <button class="floating-cart" id="open-cart">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <div class="cart-badge" id="cart-count-badge">0</div>
    </button>

    <div id="purchase-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2 class="text-accent">Order Details</h2>
            <div id="order-summary" style="margin-bottom: 2rem; padding: 1.5rem; background: rgba(255,255,255,0.05); border-radius: var(--radius); border: 1px solid var(--glass-border);">
                <!-- Details injected by JS -->
            </div>
            <div class="form-group">
                <label for="order_name">Your Name</label>
                <input type="text" id="order_name" required placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="order_phone">Phone Number</label>
                <input type="tel" id="order_phone" required placeholder="+92 300 0000000">
            </div>
            <div class="modal-btns" style="margin-top: 2rem;">
                <button id="confirm-order" class="btn btn-primary">Send Order to WhatsApp</button>
                <button id="close-purchase-modal" class="btn btn-outline">Cancel</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 German Fitness & Sports. All rights reserved.
            </div>
        </div>
    </footer>

    <script>
        const supabaseClient = window.supabaseClient;

        let currentProduct = null;

        // Mobile Menu
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');
        mobileMenu.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        let allProducts = [];

        async function loadProducts() {
            try {
                const { data: products, error } = await supabaseClient
                    .from('products')
                    .select('*');

                if (error) throw error;
                
                allProducts = products;
                renderProducts(allProducts);

            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        function renderProducts(productsToRender) {
            const productsContainer = document.getElementById('all-products');
            
            if (productsToRender.length === 0) {
                productsContainer.innerHTML = '<p style="text-align: center; grid-column: 1 / -1; color: var(--text-muted);">No products found in this category.</p>';
                return;
            }

            productsContainer.innerHTML = productsToRender.map(product => {
                const isOutOfStock = product.stock <= 0;
                return `
                        <div class="product-card" style="${isOutOfStock ? 'opacity: 0.7;' : ''}">
                            <div class="product-image">
                                <img src="${product.image_url}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/200?text=Product'">
                            </div>
                            <div class="product-info">
                                <h4>${product.name}</h4>
                                <p class="product-price">
                                    <span>${product.price} PKR</span>
                                    ${isOutOfStock ? '<span class="out-of-stock">Out of Stock</span>' : ''}
                                </p>
                                <div class="quantity-selector" style="margin: 1rem 0; display: flex; align-items: center; gap: 1rem; ${isOutOfStock ? 'display: none;' : ''}">
                                    <span style="font-size: 0.9rem; color: var(--text-muted);">Qty:</span>
                                    <div class="apple-qty">
                                        <button class="qty-btn" onclick="const q=document.getElementById('qty-${product.id}'); if(q.value>1) q.value--;">-</button>
                                        <input type="number" value="1" min="1" id="qty-${product.id}" class="qty-input" readonly>
                                        <button class="qty-btn" onclick="const q=document.getElementById('qty-${product.id}'); q.value++;">+</button>
                                    </div>
                                </div>
                                <button onclick="${isOutOfStock ? '' : `addToCartHandler('${product.id}', '${product.name}', ${product.price}, '${product.image_url}')`}" 
                                        class="btn btn-primary btn-block" 
                                        style="margin-top: 1rem; ${isOutOfStock ? 'background: #333; cursor: not-allowed; color: #777;' : ''}"
                                        ${isOutOfStock ? 'disabled' : ''}>
                                    ${isOutOfStock ? 'Sold Out' : 'Add to Cart'}
                                </button>
                            </div>
                        </div>
                    `;
            }).join('');
        }

        // Filter Logic
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                const filter = e.target.getAttribute('data-filter');
                if (filter === 'all') {
                    renderProducts(allProducts);
                } else {
                    const filtered = allProducts.filter(p => p.category && p.category.toLowerCase() === filter.toLowerCase());
                    renderProducts(filtered);
                }
            });
        });

        // Cart Handlers
        function addToCartHandler(id, name, price, image_url) {
            const qtyInput = document.getElementById(`qty-${id}`);
            const qty = qtyInput ? parseInt(qtyInput.value) : 1;
            cartManager.addToCart({ id, name, price, image_url, quantity: qty });
        }

        function updateCartUI() {
            const items = cartManager.getItems();
            const container = document.getElementById('cart-items-container');
            const totalAmount = document.getElementById('cart-total-amount');
            const badge = document.getElementById('cart-count-badge');

            badge.innerText = cartManager.getCartCount();
            totalAmount.innerText = `${cartManager.getCartTotal()} PKR`;

            if (items.length === 0) {
                container.innerHTML = `<p style="text-align: center; color: var(--text-muted); margin-top: 2rem;">Your cart is empty.</p>`;
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="cart-item">
                    <img src="${item.image_url}" class="cart-item-img" onerror="this.src='https://via.placeholder.com/200?text=Product'">
                    <div class="cart-item-info">
                        <h5>${item.name}</h5>
                        <p class="cart-item-price">${item.price} PKR</p>
                        <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
                            <button onclick="cartManager.updateQuantity('${item.id}', ${item.quantity - 1})" class="btn" style="padding: 2px 8px; font-size: 0.8rem;">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="cartManager.updateQuantity('${item.id}', ${item.quantity + 1})" class="btn" style="padding: 2px 8px; font-size: 0.8rem;">+</button>
                            <button onclick="cartManager.removeFromCart('${item.id}')" style="margin-left: auto; background: none; border: none; color: #ff4444; cursor: pointer;">Remove</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Sidebar Toggle
        const cartSidebar = document.getElementById('cart-sidebar');
        const cartOverlay = document.getElementById('cart-overlay');
        const openCartBtn = document.getElementById('open-cart');
        const closeCartBtn = document.getElementById('close-cart');

        function toggleCart() {
            cartSidebar.classList.toggle('active');
            cartOverlay.classList.toggle('active');
        }

        openCartBtn.addEventListener('click', toggleCart);
        closeCartBtn.addEventListener('click', toggleCart);
        cartOverlay.addEventListener('click', toggleCart);

        // Subscribe UI to cart changes
        cartManager.subscribe(updateCartUI);

        // Checkout Button
        document.getElementById('checkout-btn').addEventListener('click', () => {
            if (cartManager.getItems().length === 0) {
                alert('Your cart is empty!');
                return;
            }
            window.location.href = 'checkout.html';
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            updateCartUI(); // Initial render
        });

    </script>
</body>
</html>
